<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Тренировка">
<link rel="manifest" href="manifest.json">
<title>Тренировочный таймер</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f; --surface: #1c1c1c; --surface2: #252525;
    --accent: #c8ff00; --text: #f0f0f0; --muted: #666;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; overflow: hidden; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 20px; }
  .app { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 0; }
  .phase-strip { height: 4px; background: var(--surface2); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
  .phase-fill { height: 100%; border-radius: 2px; transition: width 0.3s linear, background 0.5s; background: #ff9900; width: 100%; }
  .phase-label { font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 400; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; transition: color 0.4s; min-height: 18px; }
  .timer-big { font-family: 'Oswald', sans-serif; font-size: 96px; font-weight: 300; line-height: 1; color: var(--text); letter-spacing: -4px; transition: color 0.4s; }
  .sets-label { font-family: 'Oswald', sans-serif; font-size: 28px; font-weight: 300; color: var(--muted); margin-bottom: 20px; letter-spacing: 1px; }
  .sets-label span { color: var(--accent); font-weight: 600; }
  .dots { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 28px; }
  .dot { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid #333; background: transparent; transition: background 0.3s, border-color 0.3s; display: flex; align-items: center; justify-content: center; font-size: 8px; color: #444; font-family: 'Oswald', sans-serif; font-weight: 400; }
  .dot.done { background: var(--accent); border-color: var(--accent); color: #000; }
  .dot.active { border-color: var(--accent); color: var(--accent); animation: pulse-dot 0.8s ease-in-out infinite alternate; }
  @keyframes pulse-dot { from { box-shadow: 0 0 0 0 rgba(200,255,0,0.4); } to { box-shadow: 0 0 0 5px rgba(200,255,0,0); } }
  .btn-row { display: flex; gap: 12px; margin-bottom: 24px; }
  .btn { flex: 1; padding: 16px; font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; border: 1.5px solid #333; border-radius: 4px; background: transparent; color: var(--text); cursor: pointer; transition: all 0.2s; }
  .btn:active { transform: scale(0.97); opacity: 0.8; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
  .btn.secondary { background: var(--surface); }
  .settings { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .s-field { background: var(--surface); border-radius: 4px; padding: 10px 12px; }
  .s-field label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 6px; font-family: 'Oswald', sans-serif; }
  .s-field input { background: transparent; border: none; border-bottom: 1px solid #333; color: var(--text); font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 400; width: 100%; padding: 2px 0; outline: none; text-align: left; }
  .s-field input:focus { border-bottom-color: var(--accent); }
  .s-field input:disabled { opacity: 0.4; }
  .flash { position: fixed; inset: 0; pointer-events: none; opacity: 0; transition: opacity 0.05s; z-index: 10; }
  .flash.show { opacity: 0.1; }
  .vol-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .vol-row label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-family: 'Oswald', sans-serif; white-space: nowrap; }
  .vol-row input[type=range] { flex: 1; accent-color: var(--accent); }
  .vol-val { font-family: 'Oswald', sans-serif; font-size: 16px; color: var(--accent); min-width: 36px; text-align: right; }
</style>
</head>
<body>
<div class="flash" id="flash"></div>
<div class="app">
  <div class="phase-strip"><div class="phase-fill" id="prog"></div></div>
  <div class="phase-label" id="phase-label">ГОТОВ К СТАРТУ</div>
  <div class="timer-big" id="timer">00:15</div>
  <div class="sets-label">подход <span id="cur-set">—</span> / <span id="tot-sets">12</span></div>
  <div class="dots" id="dots"></div>
  <div class="btn-row">
    <button class="btn primary" id="btn-main" onclick="toggleTimer()">СТАРТ</button>
    <button class="btn secondary" onclick="resetTimer()">СБРОС</button>
  </div>
  <div class="vol-row">
    <label>Громкость</label>
    <input type="range" id="vol" min="1" max="10" value="8" oninput="document.getElementById('vol-v').textContent=this.value">
    <span class="vol-val" id="vol-v">8</span>
  </div>
  <div class="settings">
    <div class="s-field"><label>Старт сек</label><input type="number" id="i-start" value="15" min="1" max="99"></div>
    <div class="s-field"><label>Работа сек</label><input type="number" id="i-work" value="60" min="5" max="999"></div>
    <div class="s-field"><label>Отдых сек</label><input type="number" id="i-rest" value="10" min="3" max="999"></div>
    <div class="s-field"><label>Подходов</label><input type="number" id="i-sets" value="12" min="1" max="30" oninput="updateSetsDisplay()"></div>
  </div>
</div>

<script>
let actx = null, state = 'idle', phase = 'wait';
let timeLeft = 0, totalTime = 0, currentSet = 0, totalSets = 12, interval = null, cfg = {};

function getAC() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  return actx;
}

function getVol() {
  return parseFloat(document.getElementById('vol').value) / 10;
}

// Протяжный гудок — долгий, с вибрато, слышно издалека
function siren(freq, dur, when) {
  const a = getAC();
  const t = when !== undefined ? when : a.currentTime;
  const vol = getVol();

  const master = a.createGain();
  master.gain.setValueAtTime(vol, t);
  master.gain.setValueAtTime(0.0, t + dur);
  master.connect(a.destination);

  // Square — пронзительный основной тон
  const o1 = a.createOscillator(), g1 = a.createGain();
  o1.type = 'square';
  o1.frequency.setValueAtTime(freq, t);
  // Лёгкое вибрато — звук "живой" и лучше слышен
  o1.frequency.setValueAtTime(freq,        t);
  o1.frequency.linearRampToValueAtTime(freq * 1.04, t + dur * 0.5);
  o1.frequency.linearRampToValueAtTime(freq,        t + dur);
  g1.gain.setValueAtTime(0.9, t);
  o1.connect(g1); g1.connect(master);
  o1.start(t); o1.stop(t + dur + 0.1);

  // Sawtooth октава выше — резкость
  const o2 = a.createOscillator(), g2 = a.createGain();
  o2.type = 'sawtooth'; o2.frequency.value = freq * 2;
  g2.gain.setValueAtTime(0.5, t);
  o2.connect(g2); g2.connect(master);
  o2.start(t); o2.stop(t + dur + 0.1);
}

// Начало упражнения: два коротких + один длинный
function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

function playSignal() {
  const a = getAC();
  const now = a.currentTime;
  siren(1100, 0.3,  now);
  siren(1100, 0.3,  now + 0.5);
  siren(1300, 1.5,  now + 1.0);
  // Вибрация: короткая-короткая-длинная
  vibrate([200, 100, 200, 100, 800]);
}

// Конец тренировки: нарастающий долгий гудок
function playFinish() {
  const a = getAC();
  const now = a.currentTime;
  siren(800,  0.4, now);
  siren(1000, 0.4, now + 0.6);
  siren(1400, 2.0, now + 1.2);
  // Длинная вибрация финала
  vibrate([300, 100, 300, 100, 300, 100, 1000]);
}

function doFlash(color) {
  const f = document.getElementById('flash');
  f.style.background = color;
  f.classList.add('show');
  setTimeout(() => f.classList.remove('show'), 150);
}

function fmt(s) {
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}
function loadCfg() {
  cfg = {
    start: parseInt(document.getElementById('i-start').value)||15,
    work:  parseInt(document.getElementById('i-work').value)||60,
    rest:  parseInt(document.getElementById('i-rest').value)||10,
    sets:  parseInt(document.getElementById('i-sets').value)||12
  };
  totalSets = cfg.sets;
}
function updateSetsDisplay() {
  const v = parseInt(document.getElementById('i-sets').value)||12;
  document.getElementById('tot-sets').textContent = v;
  if (state === 'idle') buildDots(v);
}
function buildDots(n) {
  n = n || totalSets;
  const row = document.getElementById('dots');
  row.innerHTML = '';
  for (let i = 1; i <= n; i++) {
    const d = document.createElement('div');
    d.className = 'dot'; d.id = 'dot-'+i; d.textContent = i;
    row.appendChild(d);
  }
}
function updateDots() {
  for (let i = 1; i <= totalSets; i++) {
    const d = document.getElementById('dot-'+i);
    if (!d) continue;
    d.className = 'dot';
    if (i < currentSet) d.classList.add('done');
    else if (i === currentSet) d.classList.add('active');
  }
}
function setPhaseStyle(ph) {
  const colors = { wait:'#ff9900', work:'#c8ff00', rest:'#00c8ff', done:'#c8ff00' };
  const labels = { wait:'ПРИГОТОВЬСЯ...', work:'РАБОТАЙ!', rest:'ОТДЫХ', done:'ГОТОВО!' };
  document.getElementById('prog').style.background = colors[ph];
  document.getElementById('phase-label').textContent = labels[ph];
  document.getElementById('phase-label').style.color = colors[ph];
  document.getElementById('timer').style.color = ph === 'work' ? colors.work : ph === 'rest' ? colors.rest : '#f0f0f0';
}
function updateUI() {
  document.getElementById('timer').textContent = fmt(timeLeft);
  document.getElementById('prog').style.width = (timeLeft/totalTime*100)+'%';
  document.getElementById('cur-set').textContent = currentSet > 0 ? currentSet : '—';
  updateDots();
}
function startPhase(ph) {
  phase = ph;
  if (ph==='wait')       { timeLeft=cfg.start; totalTime=cfg.start; setPhaseStyle('wait'); }
  else if (ph==='work')  { timeLeft=cfg.work;  totalTime=cfg.work;  setPhaseStyle('work'); playSignal(); doFlash('#c8ff00'); }
  else if (ph==='rest')  { timeLeft=cfg.rest;  totalTime=cfg.rest;  setPhaseStyle('rest'); playSignal(); doFlash('#00c8ff'); }
  else if (ph==='done')  {
    setPhaseStyle('done');
    document.getElementById('timer').textContent = '00:00';
    document.getElementById('prog').style.width = '0%';
    document.getElementById('cur-set').textContent = totalSets;
    playFinish(); doFlash('#c8ff00');
    clearInterval(interval); interval = null; state = 'idle';
    document.getElementById('btn-main').className = 'btn primary';
    document.getElementById('btn-main').textContent = 'СТАРТ';
    setInputs(false);
    for (let i=1;i<=totalSets;i++) { const d=document.getElementById('dot-'+i); if(d) d.className='dot done'; }
    return;
  }
  updateUI();
}
function tick() {
  if (timeLeft > 0) { timeLeft--; updateUI(); }
  else {
    if (phase==='wait')      { currentSet=1; startPhase('work'); }
    else if (phase==='work') { if(currentSet>=totalSets) startPhase('done'); else startPhase('rest'); }
    else if (phase==='rest') { currentSet++; startPhase('work'); }
  }
}
function setInputs(dis) {
  ['i-start','i-work','i-rest','i-sets'].forEach(id => document.getElementById(id).disabled = dis);
}
function toggleTimer() {
  if (state==='idle') {
    loadCfg(); buildDots(); currentSet=0; state='running';
    document.getElementById('btn-main').className='btn secondary';
    document.getElementById('btn-main').textContent='ПАУЗА';
    document.getElementById('tot-sets').textContent = totalSets;
    setInputs(true);
    startPhase('wait');
    interval=setInterval(tick,1000);
  } else if (state==='running') {
    state='paused'; clearInterval(interval); interval=null;
    document.getElementById('btn-main').textContent='ПРОДОЛЖИТЬ';
  } else if (state==='paused') {
    state='running';
    document.getElementById('btn-main').textContent='ПАУЗА';
    interval=setInterval(tick,1000);
  }
}
function resetTimer() {
  clearInterval(interval); interval=null;
  state='idle'; phase='wait'; currentSet=0;
  loadCfg(); buildDots();
  document.getElementById('btn-main').className='btn primary';
  document.getElementById('btn-main').textContent='СТАРТ';
  document.getElementById('timer').textContent=fmt(cfg.start);
  document.getElementById('timer').style.color='#f0f0f0';
  document.getElementById('prog').style.width='100%';
  document.getElementById('prog').style.background='#ff9900';
  document.getElementById('phase-label').textContent='ГОТОВ К СТАРТУ';
  document.getElementById('phase-label').style.color='#666';
  document.getElementById('cur-set').textContent='—';
  document.getElementById('tot-sets').textContent=cfg.sets;
  setInputs(false);
}

loadCfg(); buildDots();
document.getElementById('timer').textContent = fmt(cfg.start);
document.getElementById('tot-sets').textContent = cfg.sets;

let wakeLock = null;
async function requestWakeLock() {
  try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
}
document.getElementById('btn-main').addEventListener('click', requestWakeLock);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
